<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Play Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6F1E4;
    --ink: #2B0810;
    --muted: #7A6656;
    --court: #4A0E1B;
    --court-dark: #230810;
    --ball: #8C9A5E;
    --line: #FFFFFF;
    --alert: #B23A2E;
    --gold: #C9A227;
    --card: #FFFFFF;
    --border: rgba(43,8,16,0.12);
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{ max-width: 1120px; margin: 0 auto; padding: 28px 20px 80px; }

  header.top{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom: 22px; padding: 18px 22px; background: linear-gradient(135deg, var(--court), var(--court-dark)); border-radius: var(--radius); box-shadow: 0 6px 0 rgba(0,0,0,0.08); }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand .logo-img{ height: 58px; width:auto; display:block; }
  h1{ font-family:'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 0.5px; margin:0; line-height:0.9; color: var(--bg); }
  .subtitle{ color: rgba(246,241,228,0.75); font-size: 14px; margin-top: 22px; margin-bottom: 20px; }
  .mode-badge{ display:inline-block; margin-left:10px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:3px 10px; color:var(--muted); vertical-align:middle; }
  .mode-badge.is-admin{ background:var(--ball); color:var(--ink); border-color:var(--ball); }
  .event-title-box{ display:flex; align-items:center; justify-content:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 18px; margin-bottom:20px; text-align:center; }
  .event-title-box .event-title-text{ font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.5px; color:var(--ink); }
  .event-title-box .event-title-text.placeholder{ color:var(--muted); font-family:'Inter',sans-serif; font-size:14px; font-style:italic; }
  .top-player-panel{ background:linear-gradient(135deg, var(--gold), #9c7a24); border-radius:var(--radius); padding:26px 20px; text-align:center; color:#fff; }
  .shop-panel{ display:flex; gap:18px; align-items:stretch; background:var(--card); border:2px solid var(--gold); border-radius:var(--radius); padding:16px; overflow:hidden; }
  .shop-shirt-img{ width:220px; min-width:160px; height:auto; border-radius:10px; object-fit:cover; box-shadow:0 4px 14px rgba(0,0,0,0.18); }
  .shop-info{ display:flex; flex-direction:column; justify-content:center; gap:6px; flex:1; min-width:0; }
  .shop-title{ font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:0.5px; color:var(--court); line-height:1.1; }
  .shop-tagline{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); font-weight:700; }
  .shop-desc{ font-size:14px; color:var(--ink); line-height:1.5; }
  .shop-price-row{ display:flex; align-items:center; gap:10px; margin-top:4px; }
  .shop-price{ font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--alert); }
  .shop-cta{ font-size:13px; color:var(--muted); font-style:italic; margin-top:2px; }
  @media (max-width:520px){ .shop-panel{ flex-direction:column; } .shop-shirt-img{ width:100%; } }
  .shop-stock-row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .shop-stock{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--muted); }
  .shop-stock.is-low{ color:var(--alert); }
  .top-player-panel.empty{ background:var(--card); border:1px solid var(--border); color:var(--muted); padding:20px; }
  .top-player-crown{ font-size:42px; line-height:1; margin-bottom:6px; }
  .top-player-title{ font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.85); }
  .top-player-name{ font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:0.5px; line-height:1.15; margin-top:4px; }
  .top-player-record{ font-family:'JetBrains Mono',monospace; font-size:13px; opacity:0.9; margin-top:6px; }
  .admin-login-fab{ position:fixed; bottom:16px; right:16px; background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:8px 14px; font-size:12px; cursor:pointer; opacity:0.65; box-shadow:0 2px 8px rgba(0,0,0,0.1); z-index:40; }
  .admin-login-fab:hover{ opacity:1; }
  .operator-login-fab{ bottom:60px; }
  .session-stats{ display:flex; gap:20px; }
  .session-stat{ font-family:'JetBrains Mono', monospace; text-align:right; font-size:12px; color: rgba(246,241,228,0.7); }
  .session-stat b{ display:block; font-size:22px; color: var(--bg); font-family:'Bebas Neue',sans-serif; letter-spacing:1px; }

  .controls-row{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; align-items:center; }
  .controls-panel{ display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .control-group{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:10px 16px; }
  .control-group.danger-group{ border-color:rgba(178,58,46,0.35); }
  .control-group-label{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); white-space:nowrap; padding-right:10px; margin-right:2px; border-right:1px solid var(--border); }
  .pill-toggle{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius: 999px; padding:8px 14px; font-size:13px; cursor:pointer; user-select:none; }
  .pill-toggle input{ accent-color: var(--court); width:16px; height:16px; cursor:pointer; }
  .court-stepper{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:6px 6px 6px 14px; font-size:13px; }
  .court-stepper button{ width:26px; height:26px; border-radius:50%; border:1px solid var(--border); background:var(--bg); font-size:15px; cursor:pointer; line-height:1; }
  .spacer{ flex:1; }
  .fill-btn{ background:var(--ink); color:#fff; border:none; border-radius:999px; padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer; }
  .fill-btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .reset-btn{ background:none; border:1px solid var(--border); color:var(--muted); border-radius:999px; padding:8px 14px; font-size:13px; cursor:pointer; }
  .reset-btn:hover{ border-color: var(--alert); color: var(--alert); }

  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:50; max-width:80vw; text-align:center; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  section.label{ font-family:'Bebas Neue',sans-serif; letter-spacing:1px; font-size:20px; margin: 28px 0 12px; display:flex; align-items:center; gap:10px; }
  section.label .count-badge{ font-family:'JetBrains Mono',monospace; font-size:12px; background:var(--ink); color:#fff; border-radius:999px; padding:2px 9px; }

  .courts-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap:18px; }

  .court-tile{ background:#fff; border:3px solid var(--court); border-radius:12px; padding:14px; position:relative; min-height:220px; display:flex; flex-direction:column; box-shadow:0 4px 0 rgba(0,0,0,0.06); overflow:visible; }
  .court-tile .court-head{ display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:12px; margin-bottom:8px; color:var(--court); font-weight:700; }
  .court-tile .court-head .game-num{ font-weight:700; }
  .court-diagram{ flex:1; position:relative; display:grid; grid-template-columns:1fr 0.82fr 1fr; gap:5px; min-height:140px; }
  .court-team{ display:grid; grid-template-rows:1fr 1fr; gap:5px; }
  .court-kitchen{ background:#EAE0AE; border-radius:6px; position:relative; }
  .net-line{ position:absolute; left:50%; top:0; bottom:0; width:5px; background:#1c1712; transform:translateX(-50%); border-radius:2px; z-index:2; }
  .net-tab{ position:absolute; left:50%; width:6px; height:13px; background:#1c1712; transform:translateX(-50%); border-radius:2px; z-index:3; }
  .net-tab.top{ top:-8px; }
  .net-tab.bottom{ bottom:-8px; }
  .chip{ background:var(--court); color:#fff; border:none; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-size:13px; font-weight:700; padding:6px 8px; }
  .chip small{ display:block; font-weight:500; opacity:0.9; font-family:'JetBrains Mono',monospace; font-size:10px; margin-top:3px; color:rgba(255,255,255,0.85); }
  .court-empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border:2px dashed rgba(43,8,16,0.3); border-radius:8px; text-align:center; padding:14px; background:#fff; }
  .court-empty .msg{ font-size:13px; color:var(--muted); max-width:220px; }
  .btn{ border:none; border-radius:999px; padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-ball{ background:var(--ball); color:var(--ink); }
  .btn-ball:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-outline{ background:#fff; color:var(--court); border:1px solid var(--court); }
  .court-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:8px; }
  .timer{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }
  .result-pick{ display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  .result-pick .row{ display:flex; gap:6px; }
  .result-pick button{ flex:1; }
  .skip-link{ background:none; border:none; color:var(--muted); font-size:11px; text-decoration:underline; cursor:pointer; align-self:center; }

  .lower-grid{ display:grid; grid-template-columns: 1.4fr 1fr; gap:24px; margin-top:6px; }
  @media (max-width: 760px){ .lower-grid{ grid-template-columns:1fr; } }

  .add-form{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .add-form input[type=text]{ flex:1; min-width:120px; padding:11px 14px; border-radius:999px; border:1px solid var(--border); font-size:14px; font-family:'Inter',sans-serif; }
  .add-form select{ padding:11px 10px; border-radius:999px; border:1px solid var(--border); font-size:13px; background:#fff; }
  .add-form input:focus, .add-form select:focus{ outline:2px solid var(--court); outline-offset:1px; }
  .add-form button{ background:var(--ink); color:#fff; border:none; border-radius:999px; padding:0 20px; font-weight:600; cursor:pointer; }

  .pool-block{ margin-bottom:18px; }
  .pool-head{ display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px; }
  .pool-head .dot{ width:9px; height:9px; border-radius:50%; }

  .next-board{ display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
  .next-card{ flex:1; min-width:220px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
  .next-card.is-first{ border-left:4px solid var(--ball); }
  .next-card-label{ font-family:'JetBrains Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
  .next-card-players{ display:flex; flex-direction:column; }
  .next-player{ display:flex; align-items:center; gap:6px; font-weight:600; font-size:14px; padding:6px 0; border-bottom:1px dashed var(--border); }
  .next-player:last-child{ border-bottom:none; }
  .dot.win{ background: var(--gold); }
  .dot.loss{ background: var(--muted); }
  .dot.new{ background: var(--court); }

  .queue-list{ display:flex; flex-direction:column; gap:6px; }
  .queue-row{ display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:9px 12px; transition: opacity .15s ease, outline .1s ease; }
  .queue-row.dragging{ opacity:0.35; }
  .queue-row.drag-over{ outline:2px dashed var(--court); outline-offset:-2px; }
  .drag-handle{ cursor:grab; touch-action:none; color:var(--muted); font-size:15px; padding:4px 2px; line-height:1; user-select:none; }
  .drag-handle:active{ cursor:grabbing; }
  .pos{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--muted); width:20px; }
  .name{ flex:1; font-weight:600; font-size:14px; display:flex; align-items:center; gap:6px; }
  .skill-tag{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); background:var(--bg); border-radius:5px; padding:1px 5px; font-weight:600; }
  .wait-badge{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); min-width:58px; text-align:right; }
  .wait-badge.next{ color: #5C6B36; font-weight:700; }
  .record-badge{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); background:var(--bg); border-radius:6px; padding:2px 6px; }
  .row-actions{ display:flex; gap:4px; }
  .icon-btn{ border:1px solid var(--border); background:#fff; border-radius:6px; width:26px; height:26px; font-size:12px; cursor:pointer; color:var(--muted); line-height:1; }
  .icon-btn:hover{ border-color: var(--ink); color:var(--ink); }
  .icon-btn.active-paid{ background:var(--ball); color:var(--ink); border-color:var(--ball); font-weight:700; }
  .icon-btn.active-paddle{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
  .icon-btn.active-gender{ background:var(--court); color:var(--bg); border-color:var(--court); font-weight:700; }
  .fee-btn{ border:1px solid var(--border); background:#fff; border-radius:6px; padding:0 6px; height:26px; font-size:10px; font-family:'JetBrains Mono',monospace; font-weight:700; cursor:pointer; color:var(--muted); letter-spacing:0.5px; }
  .fee-btn.cat-student{ background:var(--court); color:var(--bg); border-color:var(--court); }
  .fee-btn.cat-free{ background:var(--muted); color:#fff; border-color:var(--muted); }

  .modal-overlay{ position:fixed; inset:0; background:rgba(20,8,10,0.55); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .modal-box{ background:var(--bg); border-radius:var(--radius); max-width:680px; width:100%; max-height:85vh; overflow-y:auto; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.35); }
  .modal-box h2{ font-family:'Bebas Neue',sans-serif; font-size:30px; margin:0; letter-spacing:0.5px; }
  .modal-close-btn{ background:var(--ink); color:#fff; border:none; border-radius:999px; padding:8px 16px; font-size:13px; cursor:pointer; }
  .income-summary{ display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 18px; }
  .income-summary span{ background:var(--card); border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-family:'JetBrains Mono',monospace; font-size:12px; }
  table.income-table{ width:100%; border-collapse:collapse; font-size:13px; }
  .income-table th, .income-table td{ text-align:left; padding:8px 6px; border-bottom:1px solid var(--border); }
  .income-table th{ font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:0.5px; }
  .income-table td.num{ text-align:right; font-family:'JetBrains Mono',monospace; }
  .income-total-row td{ font-weight:700; border-top:2px solid var(--ink); border-bottom:none; padding-top:10px; }
  .paid-pill{ font-family:'JetBrains Mono',monospace; font-size:10px; padding:2px 8px; border-radius:999px; background:var(--bg); color:var(--muted); }
  .paid-pill.is-paid{ background:var(--ball); color:var(--ink); font-weight:700; }
  .empty-note{ color:var(--muted); font-size:13px; padding:10px 4px; }
  .up-next-divider{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:10px 0 4px 2px; }

  .sitout-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .sitout-chip{ display:flex; align-items:center; gap:6px; background:var(--card); border:1px dashed var(--border); border-radius:999px; padding:6px 6px 6px 12px; font-size:13px; }
  .sitout-chip button{ background:var(--ink); color:#fff; border:none; border-radius:999px; width:22px; height:22px; cursor:pointer; font-size:12px; }

  .roster-panel{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:20px; }
  .leaderboard{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
  .leaderboard-columns{ display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
  @media (max-width:820px){ .leaderboard-columns{ grid-template-columns:1fr; } }
  .unpaid-panel{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:6px 14px; margin-bottom:20px; }
  .unpaid-row{ display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--border); }
  .unpaid-row:last-child{ border-bottom:none; }
  .unpaid-row .name{ flex:1; font-weight:600; font-size:14px; }
  .unpaid-amt{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--alert); font-weight:700; }
  .mark-paid-btn{ background:var(--ball); color:var(--ink); border:none; border-radius:999px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .lb-row{ display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .lb-row:last-child{ border-bottom:none; }
  .lb-rank{ font-family:'Bebas Neue',sans-serif; font-size:18px; width:22px; color:var(--muted); }
  .lb-rank.gold{ color:var(--gold); }
  .lb-name{ flex:1; font-weight:600; }
  .lb-record{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }
  .lb-games{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); min-width:52px; text-align:right; }
  .lb-hours{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); min-width:56px; text-align:right; }
  .champion-badge{ background:var(--gold); color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:4px 12px; border-radius:999px; white-space:nowrap; }
  .champion-badge.king-badge{ background:var(--court); color:var(--bg); }
  .champion-badge.queen-badge{ background:var(--alert); color:#fff; }
  .leaderboard-badges{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .lb-row.is-champion{ background: rgba(199,162,39,0.12); margin:0 -8px; padding:6px 8px; border-radius:8px; }
</style>
</head>
<body>
<div class="wrap" id="app">Loading queue…</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>

async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function currentAdminHash(){
  return (state && state.adminPasswordHash) ? state.adminPasswordHash : DEFAULT_ADMIN_HASH;
}

function currentIncomeHash(){
  return (state && state.incomePasswordHash) ? state.incomePasswordHash : DEFAULT_INCOME_HASH;
}

function currentOperatorHash(){
  return (state && state.operatorPasswordHash) ? state.operatorPasswordHash : DEFAULT_OPERATOR_HASH;
}

async function changeIncomePassword(){
  if(!IS_ADMIN) return;
  const current = prompt('Enter the current income password to confirm');
  if(current===null) return;
  let currentHash;
  try{ currentHash = await sha256Hex(current); }catch(e){ showToast("Couldn't verify password on this browser"); return; }
  if(currentHash !== currentIncomeHash()){ showToast('Current income password is incorrect — not changed'); return; }

  const next = prompt('Enter the new income password (this can be different from your admin password)');
  if(next===null) return;
  if(!next.trim()){ showToast('Password cannot be blank — not changed'); return; }
  const confirmNext = prompt('Re-enter the new income password to confirm');
  if(confirmNext===null) return;
  if(confirmNext !== next){ showToast('Passwords did not match — not changed'); return; }

  try{
    state.incomePasswordHash = await sha256Hex(next.trim());
  }catch(e){
    showToast("Couldn't set the new password on this browser");
    return;
  }
  saveState();
  showToast('Income password changed');
  render();
}

function upsertDirectory(p){
  if(!state.playerDirectory) state.playerDirectory = {};
  const key = (p.name||'').trim().toLowerCase();

  state.playerDirectory[key] = { name: p.name, skill: p.skill!=null?p.skill:null, gender: p.gender||null, feeCategory: p.feeCategory||'adult' };
}

let _directoryOptionsCache = '';
let _directoryOptionsCacheKey = '';
function getDirectoryOptionsHtml(){
  const dir = state.playerDirectory || {};
  // Cheap signature: number of entries + names joined. Avoids re-sorting/re-building
  // the (potentially large, ever-growing) autocomplete list on every single render —
  // only rebuild it when the roster actually changed.
  const key = Object.keys(dir).length + '|' + Object.keys(dir).join(',');
  if(key !== _directoryOptionsCacheKey){
    _directoryOptionsCacheKey = key;
    _directoryOptionsCache = Object.values(dir)
      .sort((a,b)=>a.name.localeCompare(b.name))
      .map(p=>`<option value="${p.name}"></option>`)
      .join('');
  }
  return _directoryOptionsCache;
}

function findInDirectory(name){
  if(!state.playerDirectory) return null;
  const key = (name||'').trim().toLowerCase();
  return key ? (state.playerDirectory[key] || null) : null;
}

const ADMIN_SESSION_KEY = 'pp-admin-unlocked';
const OPERATOR_SESSION_KEY = 'pp-operator-unlocked';

async function resolveAdminStatus(){
  const params = new URLSearchParams(window.location.search);
  const providedAdmin = params.get('admin');
  const providedOperator = params.get('operator');
  let matchedFromUrl = false;

  if(providedAdmin){
    try{
      const hash = await sha256Hex(providedAdmin);
      if(hash === currentAdminHash()){
        IS_ADMIN = true;
        matchedFromUrl = true;
        try{ sessionStorage.setItem(ADMIN_SESSION_KEY, '1'); }catch(e){}
      }
    }catch(e){ /* fall through to session check */ }
  }

  if(!IS_ADMIN && providedOperator){
    try{
      const hash = await sha256Hex(providedOperator);
      if(hash === currentOperatorHash()){
        IS_OPERATOR = true;
        matchedFromUrl = true;
        try{ sessionStorage.setItem(OPERATOR_SESSION_KEY, '1'); }catch(e){}
      }
    }catch(e){ /* fall through to session check */ }
  }

  // Scrub any password out of the visible URL right away — once it's unlocked
  // this tab, we don't need to keep displaying it in the address bar.
  if(matchedFromUrl){
    try{
      const url = new URL(window.location.href);
      url.searchParams.delete('admin');
      url.searchParams.delete('operator');
      window.history.replaceState({}, '', url.toString());
    }catch(e){}
  }

  // No (or wrong) URL key — fall back to a password login unlocked earlier this browser session.
  if(!IS_ADMIN){
    try{ IS_ADMIN = sessionStorage.getItem(ADMIN_SESSION_KEY) === '1'; }catch(e){ IS_ADMIN = false; }
  }
  if(!IS_ADMIN && !IS_OPERATOR){
    try{ IS_OPERATOR = sessionStorage.getItem(OPERATOR_SESSION_KEY) === '1'; }catch(e){ IS_OPERATOR = false; }
  }
}

async function loadState(){
  // 1) Instant paint from whatever's cached on this device.
  try{
    const cached = localStorage.getItem(STORAGE_KEY);
    state = cached ? migrateState(JSON.parse(cached)) : defaultState();
  }catch(e){
    state = defaultState();
  }
  render();

  // 2) Reconcile with Firebase (if it loaded) and keep listening live.
  if(!stateRef){
    setSyncStatus('⚪ Offline — changes save on this device only');
    render();
    return;
  }
  try{
    const snapshot = await stateRef.once('value');
    const remote = snapshot.val();
    if(remote){
      lastSeenJSON = JSON.stringify(remote);
      state = migrateState(remote);
      cacheLocally();
    } else {
      lastSeenJSON = JSON.stringify(state);
      stateRef.set(state);
    }
    await resolveAdminStatus();
    syncReady = true;
    setSyncStatus('🟢 Live — synced ' + new Date().toLocaleTimeString());
    render();

    stateRef.on('value', (snap)=>{
      if(isEditingNow()) return; // don't clobber someone mid-type
      const incoming = snap.val();
      if(!incoming) return;
      const json = JSON.stringify(incoming);
      if(json === lastSeenJSON) return;
      lastSeenJSON = json;
      state = migrateState(incoming);
      cacheLocally();
      setSyncStatus('🟢 Live — synced ' + new Date().toLocaleTimeString());
      render();
    });
  }catch(err){
    setSyncStatus('🔴 Live sync unavailable — working offline');
    render();
  }
}

function saveState(){
  cacheLocally();
  if(!stateRef || !syncReady) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    const json = JSON.stringify(state);
    if(json === lastSeenJSON) return;
    lastSeenJSON = json;
    stateRef.set(state).then(()=>{
      setSyncStatus('🟢 Live — synced ' + new Date().toLocaleTimeString());
    }).catch(()=>{
      setSyncStatus('🔴 Sync error — check connection');
      showToast("Couldn't sync — check connection");
    });
  }, 400);
}

// ---- fairness / matchmaking ----
function fairnessSort(list){
  if(state.autoBalance){
    return [...list].sort((a,b)=> (a.gamesPlayed - b.gamesPlayed) || (a.joinedAt - b.joinedAt));
  }
  return [...list];
}

function orderedQueue(){ return fairnessSort(state.queue); }

function skillVal(p){ return (p.skill===null || p.skill===undefined) ? 3.5 : p.skill; }

// Skill tier for the "separate by skill level" mode. Unrated players have no
// tier of their own — they fold in as fillers, same role "neutral" plays
// in winners/losers mode.
function tierOf(p){
  if(p.skill===null || p.skill===undefined) return 'unrated';
  if(p.skill < 3.0) return 'beginner';
  if(p.skill < 4.0) return 'intermediate';
  return 'advanced';
}
const TIER_LABELS = { beginner:'Beginner (2.0–2.9)', intermediate:'Intermediate (3.0–3.9)', advanced:'Advanced (4.0–5.0)' };

// Balance the 4 players into two teams: strongest+weakest vs the two middles
function assignTeams(four){
  const sorted = [...four].sort((a,b)=> skillVal(b)-skillVal(a));
  return [sorted[0], sorted[3], sorted[1], sorted[2]]; // rendered as side1(0,1) side2(2,3)
}

// The three distinct ways to pair up 4 fixed players into two teams.
// Index 0 is whatever base order the court started with (skill-balanced by default).
const TEAM_SPLITS = [[0,1,2,3],[0,2,1,3],[0,3,1,2]];
function applySplit(base, idx){
  const s = TEAM_SPLITS[((idx%3)+3)%3];
  return [base[s[0]], base[s[1]], base[s[2]], base[s[3]]];
}

function avgGameMinutes(){
  if(!state.gameDurationsMs.length) return 12;
  const avg = state.gameDurationsMs.reduce((a,b)=>a+b,0) / state.gameDurationsMs.length;
  return avg/60000;
}

function estimatedWait(indexInPool){
  const courtCount = state.courts.length || 1;
  const roundsAhead = Math.floor(indexInPool / (courtCount*4));
  if(roundsAhead===0) return {label:'Next up', next:true};
  const mins = Math.round(roundsAhead * avgGameMinutes());
  return {label: '~'+mins+' min', next:false};
}

// Choose the next group of 4. In Winners/Losers mode, anyone who hasn't played
// yet gets priority over repeat winners/losers. Once everyone's had a turn,
// winners only play winners and losers only play losers — a team that just won
// goes to the back of the winners' line and waits there until another 4
// winners have stacked up, rather than being immediately paired with whoever's
// next in line. Mixing tiers only happens as an absolute last resort so
// courts don't sit empty.
function selectGroupFrom(q){
  if(state.skillSeparationMode){
    const unrated = q.filter(p=>tierOf(p)==='unrated');
    const tiers = ['beginner','intermediate','advanced'].map(t=> ({ tier:t, list: q.filter(p=>tierOf(p)===t) }));
    const candidates = [];
    tiers.forEach(({tier,list})=>{
      if(list.length>=4) candidates.push({four:list.slice(0,4)});
      else if(list.length>0 && list.length+unrated.length>=4) candidates.push({four:[...list,...unrated].slice(0,4)});
    });
    if(candidates.length){
      // Prefer whichever candidate group contains the longest-waiting player,
      // so one skill tier can't hog every open court while another waits.
      candidates.sort((a,b)=> Math.min(...a.four.map(p=>p.joinedAt)) - Math.min(...b.four.map(p=>p.joinedAt)));
      return {four: candidates[0].four, note:null};
    }
    if(unrated.length>=4) return {four: unrated.slice(0,4), note:null};
    if(q.length>=4) return {four: q.slice(0,4), note:'Not enough in one skill level yet — mixed levels for this game.'};
    return {four:null, note:null};
  }

  if(state.winnersLosersMode){
    // Three "waiting lists": players who've never played yet (neutral), players
    // who just won and are waiting to play winners, and players who just lost
    // and are waiting to play losers. Each list only becomes a candidate group
    // once it has 4 people — that's how win-win and lose-lose groups form.
    const winners = q.filter(p=>p.lastResult==='won');
    const losers = q.filter(p=>p.lastResult==='lost');
    const neutrals = q.filter(p=>!p.lastResult);

    const candidates = [];
    if(neutrals.length>=4) candidates.push({four: neutrals.slice(0,4)});
    if(winners.length>=4){
      candidates.push({four: winners.slice(0,4)});
    } else if(winners.length>0 && (winners.length+neutrals.length)>=4){
      // Not enough winners alone yet — rather than let new/never-played
      // arrivals sit stranded waiting for 3 other newcomers to show up, fold
      // the longest-waiting of them in with the winners so everyone keeps
      // rotating through.
      candidates.push({four: [...winners, ...neutrals].slice(0,4)});
    }
    if(losers.length>=4){
      candidates.push({four: losers.slice(0,4)});
    } else if(losers.length>0 && (losers.length+neutrals.length)>=4){
      // Same idea for the losers line — a newcomer who didn't fit into a
      // winners group shouldn't have to wait around for the winners line
      // specifically. Whichever line has room first gets them playing sooner.
      candidates.push({four: [...losers, ...neutrals].slice(0,4)});
    }

    if(candidates.length){
      // Whichever ready group contains the longest-waiting player goes next.
      // This is what keeps things fair: a completed winners or losers group
      // always joins the very back of the line (see recordResult, which stamps
      // them with a fresh joinedAt), so they can only leapfrog someone who's
      // waited less time than them — never someone who's been waiting longer.
      // In practice, when a winners group and a losers group both complete from
      // the same round, the winners naturally go out first since they're
      // stamped into the queue a beat before the losers from that same game.
      candidates.sort((a,b)=> Math.min(...a.four.map(p=>p.joinedAt)) - Math.min(...b.four.map(p=>p.joinedAt)));
      return {four: candidates[0].four, note:null};
    }
    // Deliberately no "just mix whoever's free" fallback here. With winners/
    // losers lines on, a court would rather sit open for a bit than break the
    // winners-play-winners / losers-play-losers rule — e.g. with two courts,
    // Court A's 2 winners should wait for Court B's 2 winners to complete a
    // real winners-vs-winners group, not get paired against their own losers
    // just to avoid an idle court.
    return {four:null, note:null};
  }

  return { four: q.length>=4 ? q.slice(0,4) : null, note:null };
}

function selectGroup(){
  // Once a specific group of 4 becomes "next up", lock it in. Without this,
  // a different court's game finishing later could hand the algorithm a
  // "better" combination (e.g. a pure winners-4 instead of a winners+newcomer
  // mix) and silently swap out who's coming up next — which is exactly the
  // "next 4 changed on me" bug. The reservation only breaks if someone in it
  // actually leaves the queue (removed, sat out, etc.), in which case we
  // recompute fresh.
  if(state.nextFourReserved){
    const reserved = state.nextFourReserved.map(id=> state.queue.find(p=>p.id===id)).filter(Boolean);
    if(reserved.length===4) return {four: reserved, note:null};
    state.nextFourReserved = null;
  }
  const result = selectGroupFrom(orderedQueue());
  if(result.four) state.nextFourReserved = result.four.map(p=>p.id);
  return result;
}

// Simulate picking the next `count` groups in a row (without touching real
// state) so the UI can show players who's coming up, not just who's next.
function previewGroups(count){
  let working = orderedQueue();
  const groups = [];
  for(let i=0;i<count;i++){
    // The very next group is locked via selectGroup() the instant it's first
    // computed — this is what actually creates the reservation, so it locks
    // in even while every court is still full (which is exactly when people
    // are watching "Next 4"). Groups after that are just a live preview and
    // aren't locked, since they haven't been promised yet.
    const four = i===0 ? selectGroup().four : selectGroupFrom(working).four;
    if(!four) break;
    groups.push(four);
    const ids = new Set(four.map(p=>p.id));
    working = working.filter(p=>!ids.has(p.id));
  }
  return groups;
}

// ---- core actions ----
// Fills every currently-open court it can, not just one — used whenever a
// player enters (or re-enters) the pool somewhere other than "a game just
// finished", since that's the one case recordResult's own auto-fill doesn't
// cover (it only rechecks the court that just freed up).
function autoFillOpenCourts(){
  if(!state.autoFill) return false;
  let filledAny = false;
  let guard = 0; // safety cap so a logic bug can't ever loop forever
  while(guard++ < 20){
    const openCourt = state.courts.find(c=>!c.players);
    if(!openCourt) break;
    const {four} = selectGroup();
    if(!four) break;
    const ids = new Set(four.map(p=>p.id));
    state.queue = state.queue.filter(p=>!ids.has(p.id));
    if(state.nextFourReserved && state.nextFourReserved.every(id=>ids.has(id))) state.nextFourReserved = null;
    openCourt.baseFour = assignTeams(four);
    openCourt.splitIndex = 0;
    openCourt.players = applySplit(openCourt.baseFour, 0);
    openCourt.startedAt = Date.now();
    openCourt.gameNum += 1;
    openCourt.awaitingResult = false;
    filledAny = true;
  }
  return filledAny;
}

function startCourt(courtId){
  const court = state.courts.find(c=>c.id===courtId);
  if(!court || court.players) return;
  const {four, note} = selectGroup();
  if(!four){ showToast('Need 4 waiting to send in a group'); return; }
  const ids = new Set(four.map(p=>p.id));
  state.queue = state.queue.filter(p=>!ids.has(p.id));
  if(state.nextFourReserved && state.nextFourReserved.every(id=>ids.has(id))) state.nextFourReserved = null;
  court.baseFour = assignTeams(four);
  court.splitIndex = 0;
  court.players = applySplit(court.baseFour, 0);
  court.startedAt = Date.now();
  court.gameNum += 1;
  court.awaitingResult = false;
  saveState(); render();
  if(note) showToast(note);
}

function shuffleTeams(courtId){
  const court = state.courts.find(c=>c.id===courtId);
  if(!court || !court.players || court.awaitingResult) return;
  court.splitIndex = (court.splitIndex||0) + 1;
  court.players = applySplit(court.baseFour, court.splitIndex);
  saveState(); render();
}

function fillAllCourts(){
  const before = state.courts.filter(c=>!c.players).length;
  const wasAutoFill = state.autoFill;
  state.autoFill = true; // this button means "fill everything you can, right now"
  const filledAny = autoFillOpenCourts();
  state.autoFill = wasAutoFill;
  if(!filledAny){ showToast('No open courts with 4 players ready'); return; }
  const after = state.courts.filter(c=>!c.players).length;
  const filledCount = before - after;
  saveState(); render();
  showToast(after>0 ? `Filled ${filledCount} court${filledCount===1?'':'s'} — ${after} still need players` : `Filled ${filledCount} court${filledCount===1?'':'s'}`);
}

function recordResult(courtId, winnerSide){
  const court = state.courts.find(c=>c.id===courtId);
  if(!court || !court.players) return;
  const [a,b,c,d] = court.players;
  const team1 = [a,b], team2 = [c,d];

  let winners = [], losers = [];
  if(winnerSide === 'team1'){ winners = team1; losers = team2; }
  else if(winnerSide === 'team2'){ winners = team2; losers = team1; }

  if(winnerSide){
    winners.forEach(p=>{ p.wins++; p.lastResult='won'; });
    losers.forEach(p=>{ p.losses++; p.lastResult='lost'; });
  } else {
    court.players.forEach(p=> p.lastResult=null);
  }

  const duration = Date.now() - court.startedAt;
  state.gameDurationsMs.push(duration);
  if(state.gameDurationsMs.length>20) state.gameDurationsMs.shift();

  // Push winners to the back of the queue first, then losers right behind them,
  // so both land at the bottom of the line with winners ahead of losers.
  const now = Date.now();
  if(winnerSide){
    winners.forEach((p,i)=>{ p.gamesPlayed += 1; p.joinedAt = now + i; state.queue.push(p); });
    losers.forEach((p,i)=>{ p.gamesPlayed += 1; p.joinedAt = now + 2 + i; state.queue.push(p); });
  } else {
    // No winner recorded (Skip, or a game force-ended by "End Game") — send players
    // back to the queue, but don't count it toward gamesPlayed, since nothing was
    // actually decided. This keeps gamesPlayed always equal to wins + losses.
    court.players.forEach((p,i)=>{ p.joinedAt = now + i; state.queue.push(p); });
  }

  state.totalGamesPlayed += 1;
  logGamePlayed();
  court.players = null; court.startedAt = null; court.awaitingResult = false;

  saveState();
  if(state.autoFill){ autoFillOpenCourts(); saveState(); render(); } else render();
}

function totalPlayMsFor(p){
  const accrued = p.totalPlayMs || 0;

}

function formatDuration(ms){
  const totalMin = Math.floor(ms/60000);
  const h = Math.floor(totalMin/60);
  const m = totalMin % 60;
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

function todayKey(d){
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function ensureDailyEntry(key){
  if(!state.dailyLog) state.dailyLog = {};
  if(!state.dailyLog[key]) state.dailyLog[key] = { playerNames: [], income: 0, gamesPlayed: 0, playerCount: 0 };
  const entry = state.dailyLog[key];
  if(entry.gamesPlayed===undefined) entry.gamesPlayed = 0;
  // Firebase's database silently drops empty arrays/objects when a day has had
  // no check-ins yet. Self-heal that here, and keep a plain-number counter
  // (playerCount) as the source of truth for "how many players today" since
  // numbers — even 0 — are never pruned the way an empty array can be.
  if(!Array.isArray(entry.playerNames)) entry.playerNames = [];
  if(entry.playerCount===undefined) entry.playerCount = entry.playerNames.length;
  // Merch sales breakdown — folded into the same "income" total above, but
  // tracked separately here so the Weekly Report can show what portion came
  // from merch vs. Open Play.
  if(entry.merchIncome===undefined) entry.merchIncome = 0;
  if(entry.shopSold===undefined) entry.shopSold = 0;
  if(entry.gripSold===undefined) entry.gripSold = 0;
  return entry;
}

function logPlayerCheckIn(name){
  const entry = ensureDailyEntry(todayKey());
  const key = name.trim().toLowerCase();
  if(key && !entry.playerNames.some(n=>n.toLowerCase()===key)){
    entry.playerNames.push(name);
    entry.playerCount = (entry.playerCount||0) + 1;
  }
}

function logIncomeDelta(amount){
  if(!amount) return;
  const entry = ensureDailyEntry(todayKey());
  entry.income += amount;
}

// Merch sales: recorded against today's date, folded into the same daily
// "income" total as everything else (via logIncomeDelta), plus tracked
// separately (merchIncome / shopSold / gripSold) for the Weekly Report breakdown.
function logMerchSale(prefix, qty, amount){
  logIncomeDelta(amount);
  const entry = ensureDailyEntry(todayKey());
  entry.merchIncome += amount;
  entry[prefix+'Sold'] += qty;
}

function sellMerch(prefix){
  if(!IS_ADMIN && !IS_OPERATOR) return;
  const name = state[prefix+'Title'] || 'item';
  const qtyStr = prompt(`How many ${name} did you sell?`, '1');
  if(qtyStr===null) return;
  const qty = parseInt(qtyStr, 10);
  if(isNaN(qty) || qty<=0){ showToast('Enter a valid quantity'); return; }
  const price = parseFloat(state[prefix+'Price']) || 0;
  const total = Math.round(qty*price*100)/100;
  state[prefix+'Stock'] = (state[prefix+'Stock']||0) - qty;
  logMerchSale(prefix, qty, total);
  saveState(); render();
  const stockNote = state[prefix+'Stock']<0 ? ' — stock is now negative, restock needed!' : '';
  showToast(`Sold ${qty} × ${name} — ₱${total} added to today's income${stockNote}`);
}

function restockMerch(prefix){
  if(!IS_ADMIN && !IS_OPERATOR) return;
  const name = state[prefix+'Title'] || 'item';
  const qtyStr = prompt(`How many ${name} are you adding to stock?`, '');

}

async function editDailyIncome(key){
  if(!IS_ADMIN) return;
  const pw = prompt('Enter the income password to correct this day\u2019s numbers');
  if(pw===null) return;
  let hash;
  try{ hash = await sha256Hex(pw); }catch(e){ showToast("Couldn't verify password on this browser"); return; }
  if(hash !== currentIncomeHash()){ showToast('Incorrect income password — nothing changed'); return; }

  const entry = ensureDailyEntry(key);
  let changed = [];

  const nextIncome = prompt(`New total income for ${key} (currently \u20b1${entry.income||0})\n\nLeave as-is and press OK, or Cancel to skip this field.`, String(entry.income||0));
  if(nextIncome!==null){
    const value = parseFloat(nextIncome);
    if(isNaN(value) || value < 0){ showToast('Income: enter a valid, non-negative amount — left unchanged'); }
    else{ entry.income = Math.round(value * 100) / 100; changed.push('income'); }
  }

  const nextPlayers = prompt(`New player count for ${key} (currently ${entry.playerCount||0})\n\nCancel to skip this field.`, String(entry.playerCount||0));
  if(nextPlayers!==null){
    const value = parseInt(nextPlayers, 10);
    if(isNaN(value) || value < 0){ showToast('Players: enter a valid, non-negative whole number — left unchanged'); }
    else{ entry.playerCount = value; changed.push('players'); }
  }

  const nextGames = prompt(`New games-played count for ${key} (currently ${entry.gamesPlayed||0})\n\nCancel to skip this field.`, String(entry.gamesPlayed||0));
  if(nextGames!==null){
    const value = parseInt(nextGames, 10);
    if(isNaN(value) || value < 0){ showToast('Games: enter a valid, non-negative whole number — left unchanged'); }
    else{ entry.gamesPlayed = value; changed.push('games'); }
  }

  if(!changed.length){ showToast('Nothing changed'); return; }
  saveState(); render();
  showToast(`${key}: updated ${changed.join(', ')}`);
}

function closeOutDay(){
  if(!state) return;
  const activeCourtIds = state.courts.filter(c=>c.players).map(c=>c.id);
  state.autoFill = false; // don't refill courts once the day is closing
  activeCourtIds.forEach(id=> recordResult(id, null)); // skip score, finish, send players back to the queue

  const key = todayKey();
  const entry = ensureDailyEntry(key);

  // Safety net: make sure everyone currently on the roster — including anyone
  // sitting out — is reflected in today's count, in case they were ever missed
  // (e.g. added through a path that didn't log a check-in). logPlayerCheckIn
  // is dedup-safe, so re-logging someone already counted is a no-op.
  const everyonePresent = [...state.queue, ...state.sittingOut];
  everyonePresent.forEach(p=> logPlayerCheckIn(p.name));

  // Archive a full snapshot of today's roster — this survives "Reset session"
  // (unlike the live queue itself), so you can look back at exactly who played,
  // their record, and their payment/paddle status even after starting fresh.
  if(!state.sessionArchives) state.sessionArchives = {};
  state.sessionArchives[key] = {
    savedAt: Date.now(),
    income: entry.income || 0,
    gamesPlayed: entry.gamesPlayed || 0,
    playerCount: entry.playerCount || 0,
    players: everyonePresent.map(p=>({
      name: p.name,
      skill: p.skill,
      gender: p.gender,
      feeCategory: p.feeCategory,
      paid: p.paid,
      paddleRent: p.paddleRent,
      wins: p.wins,
      losses: p.losses,
      gamesPlayed: p.gamesPlayed,
      totalPlayMs: totalPlayMsFor(p)
    })).sort((a,b)=> a.name.localeCompare(b.name))
  };

  state.lastAutoStopDate = key;
  saveState(); render();

  const summary = "Game ended — all active games were stopped.\n\n"
    + `Players checked in today: ${entry.playerCount}\n`
    + `Games played today: ${entry.gamesPlayed}\n`
    + `Income collected today: ₱${entry.income}\n\n`
    + `A full snapshot of today's roster was saved — find it in the Weekly Report (📦 icon) any time, even after resetting the session.`;
  alert(summary);
}

function exportAllData(){
  const all = [...state.queue, ...state.sittingOut, ...state.courts.flatMap(c=>c.players||[])];
  if(!all.length){ showToast('No player data to export yet'); return; }

  const statusOf = (p)=>{
    if(state.courts.some(c=>c.players && c.players.some(cp=>cp.id===p.id))) return 'On court';
    if(state.sittingOut.some(sp=>sp.id===p.id)) return 'Sitting out';
    return 'Waiting';
  };

  const csvEscape = (v)=>{
    const s = String(v);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };

  const header = ['Name','Skill','Gender','Fee Category','Paddle Rent','Paid','Amount (PHP)','Games Played','Wins','Losses','Status'];
  let collected = 0, pending = 0;
  const rows = all.map(p=>{
    const amt = feeAmount(p);
    if(p.paid) collected += amt; else pending += amt;
    return [
      p.name,
      p.skill!=null ? p.skill.toFixed(1) : '',
      p.gender || '',
      p.feeCategory==='adult' ? 'Adult' : p.feeCategory==='student' ? 'Student' : 'Free',
      p.paddleRent ? 'Yes' : 'No',
      p.paid ? 'Yes' : 'No',
      amt,
      p.gamesPlayed,
      p.wins,
      p.losses,
      statusOf(p)
    ];
  });

  let csv = header.map(csvEscape).join(',') + '\n';
  rows.forEach(r=>{ csv += r.map(csvEscape).join(',') + '\n'; });
  csv += '\n';
  csv += `Total games played,${state.totalGamesPlayed}\n`;
  csv += `Average game length (min),${Math.round(avgGameMinutes())}\n`;
  csv += `Collected (PHP),${collected}\n`;
  csv += `Pending (PHP),${pending}\n`;
  csv += `Total (PHP),${collected+pending}\n`;

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href = url;
  a.download = `pickleball-session-data-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`Exported full data for ${all.length} player${all.length===1?'':'s'}`);
}

function parseCsvLine(line){
  const result = [];
  let cur = '';
  let inQuotes = false;
  for(let i=0;i<line.length;i++){
    const ch = line[i];
    if(inQuotes){
      if(ch === '"'){
        if(line[i+1] === '"'){ cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if(ch === '"') inQuotes = true;
      else if(ch === ',') { result.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function parseAllDataCSV(text){
  const lines = (text||'').split(/\r?\n/);
  if(!lines.length) return null;
  const header = parseCsvLine(lines[0]).map(h=>h.trim().toLowerCase());
  const idx = name => header.indexOf(name);
  const iName=idx('name'), iSkill=idx('skill'), iGender=idx('gender'), iCat=idx('fee category'),
        iPaddle=idx('paddle rent'), iPaid=idx('paid'), iGP=idx('games played'),
        iWins=idx('wins'), iLosses=idx('losses'), iStatus=idx('status');
  if(iName<0) return null;

  const players = [];
  const summary = {};
  let i = 1;
  for(; i<lines.length; i++){
    const raw = lines[i];
    if(raw.trim()===''){ i++; break; }
    const cols = parseCsvLine(raw);
    if(!cols[iName] || !cols[iName].trim()) continue;
    const catRaw = (cols[iCat]||'').trim().toLowerCase();
    const genderRaw = (cols[iGender]||'').trim().toUpperCase();
    players.push({
      name: cols[iName].trim(),
      skill: (iSkill>=0 && cols[iSkill] && cols[iSkill].trim()!=='') ? parseFloat(cols[iSkill]) : null,
      gender: (genderRaw==='M'||genderRaw==='F') ? genderRaw : null,
      feeCategory: catRaw==='student' ? 'student' : catRaw==='free' ? 'free' : 'adult',
      paddleRent: iPaddle>=0 && (cols[iPaddle]||'').trim().toLowerCase()==='yes',
      paid: iPaid>=0 && (cols[iPaid]||'').trim().toLowerCase()==='yes',
      gamesPlayed: (iGP>=0 && parseInt(cols[iGP],10)) || 0,
      wins: (iWins>=0 && parseInt(cols[iWins],10)) || 0,
      losses: (iLosses>=0 && parseInt(cols[iLosses],10)) || 0,
      status: iStatus>=0 ? (cols[iStatus]||'Waiting').trim() : 'Waiting'
    });
  }
  for(; i<lines.length; i++){
    const raw = lines[i];
    if(!raw.trim()) continue;
    const cols = parseCsvLine(raw);
    if(cols.length>=2) summary[cols[0].trim()] = cols[1].trim();
  }
  return { players, summary };
}

function importAllData(text){
  const parsed = parseAllDataCSV(text);
  if(!parsed || !parsed.players.length){ showToast('No valid data found in that file'); return; }

  let count = 0;
  parsed.players.forEach((pd, i)=>{
    const player = {
      id: uid(),
      name: pd.name,
      skill: (pd.skill!=null && !isNaN(pd.skill)) ? Math.min(5, Math.max(2, pd.skill)) : null,
      gender: pd.gender,
      feeCategory: pd.feeCategory,
      paddleRent: pd.paddleRent,
      paid: pd.paid,
      gamesPlayed: pd.gamesPlayed,
      wins: pd.wins,
      losses: pd.losses,
      lastResult: null,
      joinedAt: Date.now()+i
    };
    if(pd.status && pd.status.toLowerCase()==='sitting out') state.sittingOut.push(player);
    else state.queue.push(player);
    count++;
  });

  const tgp = parseInt(parsed.summary['Total games played'], 10);
  if(!isNaN(tgp)) state.totalGamesPlayed = tgp;
  const avgMin = parseFloat(parsed.summary['Average game length (min)']);
  if(!isNaN(avgMin) && avgMin>0) state.gameDurationsMs = [avgMin*60000];

  saveState(); render();
  showToast(`Imported full data for ${count} player${count===1?'':'s'}`);
}

// Accepts JSON (array of {name, skill} or plain name strings) or a simple
// text/CSV list — one player per line, optionally "Name, skill".
function parseImportedPlayers(text){
  text = (text||'').trim();
  if(!text) return [];

  try{
    const parsed = JSON.parse(text);
    if(Array.isArray(parsed)){
      return parsed.map(item=>{
        if(typeof item === 'string') return { name: item.trim(), skill: null };
        const name = (item.name||'').toString().trim();
        const rawSkill = item.skill;
        const skill = (rawSkill!==null && rawSkill!==undefined && rawSkill!=='') ? parseFloat(rawSkill) : null;
        return { name, skill: (skill!=null && !isNaN(skill)) ? skill : null };
      }).filter(p=>p.name);
    }
  }catch(e){ /* not JSON — fall through to line-based parsing */ }

  return text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map(line=>{
    const parts = line.split(',');
    const name = parts[0].trim();
    let skill = null;
    if(parts[1]!==undefined && parts[1].trim()!==''){
      const v = parseFloat(parts[1]);
      if(!isNaN(v)) skill = v;
    }
    return { name, skill };
  }).filter(p=>p.name);
}

function importPlayers(list){
  let count = 0;
  list.forEach(({name, skill}, i)=>{
    if(!name) return;
    const known = findInDirectory(name);
    const cleanSkill = (skill!=null && !isNaN(skill)) ? Math.min(5, Math.max(2, skill)) : (known ? known.skill : null);
    const now = Date.now()+i;
    const player = { id: uid(), name, gamesPlayed:0, wins:0, losses:0, skill: cleanSkill, lastResult:null, paid:false, paddleRent:false, gender: known?known.gender:null, feeCategory: known?known.feeCategory:'adult', checkInAt: now, totalPlayMs: 0, joinedAt: now };
    state.queue.push(player);
    logPlayerCheckIn(name);
    upsertDirectory(player);
    count++;
  });
  if(!count){ showToast('No players found in that file'); return; }
  autoFillOpenCourts();
  saveState(); render();
  showToast(`Imported ${count} player${count===1?'':'s'}`);
}

function removeFromQueue(id){
  state.queue = state.queue.filter(p=>p.id!==id);
  state.sittingOut = state.sittingOut.filter(p=>p.id!==id);
  saveState(); render();
}

function sitOut(id){
  const p = state.queue.find(p=>p.id===id);
  if(!p) return;
  if(p.checkInAt){ p.totalPlayMs = (p.totalPlayMs||0) + Math.max(0, Date.now()-p.checkInAt); p.checkInAt = null; }
  state.queue = state.queue.filter(x=>x.id!==id);
  state.sittingOut.push(p);
  saveState(); render();
}

function returnFromSitOut(id){
  const p = state.sittingOut.find(p=>p.id===id);
  if(!p) return;
  state.sittingOut = state.sittingOut.filter(x=>x.id!==id);
  p.joinedAt = Date.now();
  p.checkInAt = Date.now();
  state.queue.push(p);
  autoFillOpenCourts();
  saveState(); render();
}

function moveInQueue(id, dir){
  if(state.autoBalance){
    state.autoBalance = false;
    showToast('Switched to manual queue order');
  }
  const idx = state.queue.findIndex(p=>p.id===id);
  if(idx<0) return;
  const swapWith = idx + dir;
  if(swapWith<0 || swapWith>=state.queue.length) return;
  [state.queue[idx], state.queue[swapWith]] = [state.queue[swapWith], state.queue[idx]];
  // A deliberate manual reorder should actually take effect, even if the next
  // group was already locked in — the lock exists to stop *other* games from
  // silently reshuffling things, not to block the admin's own intentional move.
  state.nextFourReserved = null;
  saveState(); render();
}

function reorderQueueByDrag(draggedId, targetId){
  if(!draggedId || !targetId || draggedId===targetId) return;
  if(state.autoBalance){
    state.autoBalance = false;
    showToast('Switched to manual queue order');
  }
  const fromIdx = state.queue.findIndex(p=>p.id===draggedId);
  if(fromIdx<0) return;
  const [item] = state.queue.splice(fromIdx, 1);
  const toIdx = state.queue.findIndex(p=>p.id===targetId);
  const insertAt = toIdx<0 ? state.queue.length : toIdx;
  state.queue.splice(insertAt, 0, item);
  // Same as moveInQueue: a deliberate drag should actually take effect, not
  // get silently overridden by whatever group was already locked in.
  state.nextFourReserved = null;
  saveState(); render();
}

function setCourtCount(n){
  n = Math.max(1, Math.min(8, n));
  if(n > state.courts.length){
    const maxId = state.courts.reduce((m,c)=>Math.max(m,c.id),0);
    for(let i=1;i<= n-state.courts.length;i++){
      state.courts.push({id:maxId+i, players:null, startedAt:null, gameNum:0, awaitingResult:false});
    }
  } else if(n < state.courts.length){
    for(let i=state.courts.length-1; i>=n; i--){
      if(state.courts[i].players){ showToast('Finish that game before removing the court'); return; }
      state.courts.pop();
    }
  }
  saveState(); render();
}

function resetSession(){
  if(!confirm('Clear all players and courts and start a new session?')) return;
  const keepDirectory = state.playerDirectory;
  const keepDailyLog = state.dailyLog;
  const keepArchives = state.sessionArchives;
  const keepAdminHash = state.adminPasswordHash;
  const keepIncomeHash = state.incomePasswordHash;
  const keepOperatorHash = state.operatorPasswordHash;
  state = defaultState();
  state.playerDirectory = keepDirectory || {};
  state.dailyLog = keepDailyLog || {};
  state.sessionArchives = keepArchives || {};
  state.adminPasswordHash = keepAdminHash || DEFAULT_ADMIN_HASH;
  state.incomePasswordHash = keepIncomeHash || DEFAULT_INCOME_HASH;
  state.operatorPasswordHash = keepOperatorHash || DEFAULT_OPERATOR_HASH;
  saveState(); render();
}

function resetScoresKeepPlayers(){
  if(!confirm("Reset the queue, courts, and all stats back to zero? Everyone's name and skill rating stays.")) return;
  const allPlayers = [];
  // Order: anyone mid-game goes first (they were about to rotate anyway), then the
  // current queue order, then anyone sitting out — so the fresh queue still reflects
  // roughly who'd been waiting longest.
  state.courts.forEach(c=>{ if(c.players) c.players.forEach(p=>allPlayers.push(p)); });
  state.queue.forEach(p=>allPlayers.push(p));
  state.sittingOut.forEach(p=>allPlayers.push(p));

  const now = Date.now();
  allPlayers.forEach((p,i)=>{
    p.gamesPlayed = 0;
    p.wins = 0;
    p.losses = 0;
    p.lastResult = null;
    p.joinedAt = now + i;
    if(!p.checkInAt) p.checkInAt = now;
  });

  state.queue = allPlayers;
  state.sittingOut = [];
  state.courts.forEach(c=>{ c.players = null; c.startedAt = null; c.gameNum = 0; c.awaitingResult = false; });
  state.totalGamesPlayed = 0;
  state.gameDurationsMs = [];
  state.nextFourReserved = null;

  saveState(); render();
  showToast('Scores reset — everyone kept their spot in line');
}

function fmtElapsed(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const sec = s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

  // Operator view: same day-to-day player/queue management tools as admin

        <section class="label">Up next <span class="count-badge">${waitingCount} waiting</span></section>

      <div>
        <section class="label">Add player</section>

          <button type="button" class="reset-btn" data-action="export-players">Export players</button>

          <input type="text" id="name-input" list="player-directory-list" placeholder="Player name (start typing to find a returning player)" autocomplete="off">
          <select id="skill-input">
            <option value="">Unrated</option>
            <option value="2.0">2.0</option>
            <option value="2.5">2.5</option>
            <option value="3.0">3.0</option>
            <option value="3.5">3.5</option>
            <option value="4.0">4.0</option>
            <option value="4.5">4.5</option>

            <option value="student">Student</option>

            <option value="M">Male</option>

              : state.winnersLosersMode
              ? 'Winners and losers lines are on: after each scored game, winners queue up to play winners and losers queue up to play losers. New arrivals wait in the middle line, but if there aren\u2019t enough of them yet to form their own group, they get folded into whichever line \u2014 winners or losers \u2014 has room first, so nobody sits stranded.' + wlStatusText

        <div class="unpaid-panel">${unpaidHtml}</div>

        <section class="label" style="font-size:16px;">Leaderboard</section>
        <div class="leaderboard">
          ${withGames.length ? `<div class="lb-row" style="border-bottom:2px solid var(--ink); margin-bottom:2px; padding-bottom:8px;"><span class="lb-rank"></span><span class="lb-name" style="font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted);">Player</span><span class="lb-games" style="font-weight:700;">GP</span><span class="lb-record" style="font-weight:700;">W-L</span></div>` : ''}

    ${queenPanelHtml}

  const playerBodyHtml = `

    <section class="label">Leaderboard</section>

  const adminLoginFabHtml = !IS_ADMIN ? `<button class="admin-login-fab" data-action="admin-login">🔐 Admin</button>` : '';

  app.innerHTML = `
    <header class="top">
      <div class="brand">
        <img class="logo-img" src="${LOGO_SRC}" alt="Picklers Paradise logo">
      </div>
      <div class="session-stats">
        ${IS_ADMIN ? `<div class="session-stat">SYNC<b style="font-size:13px;">${syncStatusText}</b></div>` : ''}
        <div class="session-stat">GAMES PLAYED<b>${state.totalGamesPlayed}</b></div>
        <div class="session-stat">AVG LENGTH<b>${Math.round(avgGameMinutes())}m</b></div>
        <div class="session-stat">TIME<b id="header-clock">${new Date().toLocaleTimeString()}</b></div>
      </div>
    </header>
    <div class="subtitle">Automatic, fair rotation for doubles — every group is 4 players, skill-balanced when ratings are set.
      ${IS_ADMIN ? `<span class="mode-badge is-admin">✏️ Edit Mode</span>` : IS_OPERATOR ? `<span class="mode-badge is-admin">🧑‍💼 Operator Mode</span>` : ''}

    ${(state.eventTitle || IS_ADMIN || IS_OPERATOR) ? `
    <div class="event-title-box">
      <span class="event-title-text ${state.eventTitle ? '' : 'placeholder'}">${state.eventTitle || 'Tap ✎ to set a title for today\u2019s open play'}</span>

    ${IS_ADMIN ? adminBodyHtml : (IS_OPERATOR ? operatorBodyHtml : playerBodyHtml)}

    ${operatorLoginFabHtml}
  `;

  const form = document.getElementById('add-form');
  if(form){
    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      if(!IS_ADMIN && !IS_OPERATOR){ showToast('View only — ask the admin for the edit link'); return; }
      const input = document.getElementById('name-input');
      const skillInput = document.getElementById('skill-input');
      const feeInput = document.getElementById('fee-input');
      const genderInput = document.getElementById('gender-input');
      addPlayer(input.value, skillInput.value ? parseFloat(skillInput.value) : null, feeInput.value, genderInput.value || null);
      input.value=''; skillInput.value=''; feeInput.value='adult'; genderInput.value='';
      input.focus();
    });
    const nameInput = document.getElementById('name-input');
    nameInput.addEventListener('input', ()=>{
      const known = findInDirectory(nameInput.value);
      if(!known) return;
      const skillInput = document.getElementById('skill-input');
      const feeInput = document.getElementById('fee-input');
      const genderInput = document.getElementById('gender-input');
      skillInput.value = known.skill!=null ? String(known.skill) : '';
      feeInput.value = known.feeCategory || 'adult';
      genderInput.value = known.gender || '';
    });
  }

  const fileInput = document.getElementById('import-file-input');
  if(fileInput){
    fileInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        const list = parseImportedPlayers(reader.result);
        importPlayers(list);
      };
      reader.onerror = ()=> showToast("Couldn't read that file");
      reader.readAsText(file);
      e.target.value = '';
    });
  }

  const allDataFileInput = document.getElementById('import-all-data-file-input');
  if(allDataFileInput){
    allDataFileInput.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=> importAllData(reader.result);
      reader.onerror = ()=> showToast("Couldn't read that file");
      reader.readAsText(file);
      e.target.value = '';
    });
  }

  startTimers();

function updateLiveDurations(){
  document.querySelectorAll('[data-timer]').forEach(el=>{
    const started = Number(el.getAttribute('data-started'));
    if(started) el.textContent = fmtElapsed(Date.now()-started);
  });
  document.querySelectorAll('[data-checkin]').forEach(el=>{
    const checkin = el.getAttribute('data-checkin');
    const accrued = Number(el.getAttribute('data-accrued'))||0;
    const liveMs = checkin ? accrued + Math.max(0, Date.now()-Number(checkin)) : accrued;
    el.textContent = formatDuration(liveMs);
  });
  const clockEl = document.getElementById('header-clock');
  if(clockEl) clockEl.textContent = new Date().toLocaleTimeString();
}
function startTimers(){ updateLiveDurations(); }
setInterval(updateLiveDurations, 1000);

const READ_ONLY_ACTIONS = new Set(['export-players','export-all-data','copy-view-link','admin-login','operator-login']);
// Actions an Operator is allowed to perform: player/queue management only —
// no court control, settings, reports, or password changes.
// Operator gets everything except Income, Weekly Report, and Account/password actions.
const OPERATOR_ACTIONS = new Set([
  'edit','toggle-paid','toggle-paddle','toggle-gender','toggle-fee','up','down','sitout','return','remove','operator-logout',
  'start','fill-all','shuffle','end','win','skip','cancel-result','reset-court',
  'edit-courts-title','edit-event-title','edit-shop-field','sell-merch','restock-merch',
  'court-plus','court-minus','reset-scores','reset','close-day',
  'export-players','import-players','export-all-data','import-all-data'
]);

document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.getAttribute('data-action');
  const allowed = IS_ADMIN || READ_ONLY_ACTIONS.has(action) || (IS_OPERATOR && OPERATOR_ACTIONS.has(action));
  if(!allowed){
    showToast(IS_OPERATOR ? "Operators can't do that — ask the admin" : 'View only — ask the admin for the edit link');
    return;
  }
  const id = btn.getAttribute('data-id');
  const field = btn.getAttribute('data-field');
  switch(action){
    case 'start': startCourt(Number(id)); break;
    case 'fill-all': fillAllCourts(); break;
    case 'shuffle': shuffleTeams(Number(id)); break;
    case 'edit': editPlayer(id); break;
    case 'edit-courts-title': editCourtsTitle(); break;
    case 'edit-event-title': editEventTitle(); break;
    case 'edit-shop-field': editShopField(field); break;
    case 'sell-merch': sellMerch(field); break;
    case 'restock-merch': restockMerch(field); break;
    case 'toggle-paid': togglePaid(id); break;
    case 'toggle-paddle': togglePaddleRent(id); break;
    case 'toggle-gender': cycleGender(id); break;
    case 'toggle-fee': cycleFeeCategory(id); break;
    case 'open-income': showIncomeView = true; render(); break;
    case 'close-income': showIncomeView = false; render(); break;
    case 'open-weekly-report': showWeeklyReport = true; weeklyReportWeekOffset = 0; render(); break;
    case 'close-weekly-report': showWeeklyReport = false; weeklyReportWeekOffset = 0; viewingArchiveKey = null; render(); break;
    case 'view-archive': viewingArchiveKey = btn.getAttribute('data-key'); render(); break;
    case 'close-archive': viewingArchiveKey = null; render(); break;
    case 'export-players': exportPlayers(); break;
    case 'export-all-data': exportAllData(); break;
    case 'copy-view-link': {
      const viewUrl = new URL(window.location.href);
      viewUrl.searchParams.delete('admin');
      const urlStr = viewUrl.toString();
      if(navigator.clipboard) navigator.clipboard.writeText(urlStr).catch(()=>{});
      alert('View-only link (copied to clipboard):\n' + urlStr + '\n\nAnyone with this link sees live updates but can\'t make changes. Keep your admin link (with ?admin=...) private.');
      break;
    }
    case 'import-all-data': document.getElementById('import-all-data-file-input').click(); break;
    case 'import-players': document.getElementById('import-file-input').click(); break;
    case 'admin-login': promptAdminLogin(); break;
    case 'admin-logout': adminLogout(); break;
    case 'operator-login': promptOperatorLogin(); break;
    case 'operator-logout': operatorLogout(); break;
    case 'change-operator-password': changeOperatorPassword(); break;
    case 'change-admin-password': changeAdminPassword(); break;
    case 'change-income-password': changeIncomePassword(); break;
    case 'close-day': if(confirm('End the game now? This stops all active games and tallies today\u2019s numbers.')) closeOutDay(); break;
    case 'end': openResultPicker(Number(id)); break;
    case 'reset-court': resetCourt(Number(id)); break;
    case 'win': recordResult(Number(id), btn.getAttribute('data-side')); break;
    case 'skip': recordResult(Number(id), null); break;
    case 'cancel-result': cancelResultPicker(Number(id)); break;
    case 'up': moveInQueue(id,-1); break;
    case 'down': moveInQueue(id,1); break;
    case 'sitout': sitOut(id); break;
    case 'return': returnFromSitOut(id); break;
    case 'remove': removeFromQueue(id); break;
    case 'court-plus': setCourtCount(state.courts.length+1); break;
    case 'court-minus': setCourtCount(state.courts.length-1); break;
    case 'reset-scores': resetScoresKeepPlayers(); break;
    case 'reset': resetSession(); break;
  }
});
document.addEventListener('change', (e)=>{
  if(!e.target.matches('[data-action]')) return;
  if(!IS_ADMIN && !IS_OPERATOR){ e.target.checked = !e.target.checked; showToast('View only — ask the admin for the edit link'); return; }
  if(e.target.matches('[data-action="toggle-autofill"]')){ state.autoFill = e.target.checked; saveState(); }
  if(e.target.matches('[data-action="toggle-balance"]')){ state.autoBalance = e.target.checked; saveState(); render(); }
  if(e.target.matches('[data-action="toggle-wl"]')){
    state.winnersLosersMode = e.target.checked;
    if(state.winnersLosersMode && state.skillSeparationMode){ state.skillSeparationMode = false; showToast('Turned off skill separation — only one queue mode runs at a time'); }
    if(state.winnersLosersMode){
      const totalPlayers = state.queue.length + state.sittingOut.length + state.courts.reduce((s,c)=> s + (c.players ? c.players.length : 0), 0);
      if(totalPlayers < 8){
        showToast(`Heads up: only ${totalPlayers} players checked in — winners/losers lines work best with 8+, or a court may sit waiting`);
      }
    }
    saveState(); render();
  }
  if(e.target.matches('[data-action="toggle-skill-sep"]')){
    state.skillSeparationMode = e.target.checked;
    if(state.skillSeparationMode && state.winnersLosersMode){ state.winnersLosersMode = false; showToast('Turned off winners/losers lines — only one queue mode runs at a time'); }
    saveState(); render();
  }
});

// ---- drag-to-reorder (pointer events cover mouse, touch, and pen) ----
const dragState = { id: null, overId: null, active: false };

document.addEventListener('pointerdown', (e)=>{
  if(!IS_ADMIN && !IS_OPERATOR) return;
  const handle = e.target.closest('.drag-handle');
  if(!handle) return;
  const row = handle.closest('.queue-row[data-draggable="true"]');
  if(!row) return;
  dragState.id = row.getAttribute('data-id');
  dragState.overId = null;
  dragState.active = true;
  row.classList.add('dragging');
  try{ handle.setPointerCapture(e.pointerId); }catch(err){}
  e.preventDefault();
});

document.addEventListener('pointermove', (e)=>{
  if(!dragState.active) return;
  e.preventDefault();
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const row = el ? el.closest('.queue-row[data-draggable="true"]') : null;
  document.querySelectorAll('.queue-row.drag-over').forEach(r=>r.classList.remove('drag-over'));
  if(row && row.getAttribute('data-id') !== dragState.id){
    row.classList.add('drag-over');
    dragState.overId = row.getAttribute('data-id');
  } else {
    dragState.overId = null;
  }
});

function endDrag(){
  if(!dragState.active) return;
  dragState.active = false;
  document.querySelectorAll('.queue-row.dragging, .queue-row.drag-over').forEach(r=>r.classList.remove('dragging','drag-over'));
  if(dragState.overId && dragState.overId !== dragState.id){
    reorderQueueByDrag(dragState.id, dragState.overId);
  }
  dragState.id = null;
  dragState.overId = null;
}
document.addEventListener('pointerup', endDrag);
document.addEventListener('pointercancel', endDrag);

resolveAdminStatus().then(loadState);
</script>
